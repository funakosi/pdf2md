<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
    <marker id="arrow-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#000"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="white"/>


  <!-- MongoDB Cylinder -->
  <!-- body rectangle -->
  <rect x="35" y="98" width="120" height="132" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- top ellipse (solid) -->
  <ellipse cx="95" cy="98" rx="60" ry="18" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- bottom ellipse arc (front face only) -->
  <path d="M 35 230 A 60 18 0 0 0 155 230" fill="none" stroke="black" stroke-width="1.5"/>
  <!-- MongoDB label -->
  <text x="95" y="163" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="14" fill="black">MongoDB</text>


  <!-- Back-End container -->
  <rect x="240" y="65" width="185" height="195" fill="white" stroke="black" stroke-width="1.5"/>
  <!-- "API App" inner box -->
  <rect x="260" y="80" width="145" height="100" fill="white" stroke="black" stroke-width="1.2"/>
  <text x="332" y="128" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="black">API</text>
  <text x="332" y="148" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="13" fill="black">App</text>
  <!-- Node.js label -->
  <text x="332" y="200" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">Node.js</text>
  <!-- "Back-End" footer label -->
  <text x="332" y="278" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">Back-End</text>


  <!-- Front-End outer (Client) -->
  <rect x="490" y="65" width="195" height="195" fill="white" stroke="black" stroke-width="1.5"/>


  <!-- Browser box -->
  <rect x="502" y="77" width="171" height="157" fill="white" stroke="black" stroke-width="1.2"/>


  <!-- React box -->
  <rect x="514" y="89" width="147" height="121" fill="white" stroke="black" stroke-width="1.2"/>


  <!-- App box -->
  <rect x="526" y="101" width="123" height="91" fill="white" stroke="black" stroke-width="1.2"/>
  <!-- Labels inside nested boxes -->
  <text x="587" y="151" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">App</text>
  <text x="587" y="206" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">React</text>
  <text x="587" y="227" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">Browser</text>
  <text x="587" y="252" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">Client</text>
  <!-- "Front-End" footer label -->
  <text x="587" y="278" text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">Front-End</text>


  <!-- Arrow: MongoDB <-> Back-End, upper line (MongoDB→Back-End) -->
  <line x1="155" y1="150" x2="240" y2="157"
        stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Arrow: Back-End → MongoDB, lower line -->
  <line x1="240" y1="167" x2="155" y2="160"
        stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- JSON label -->
  <text x="197" y="148"
        text-anchor="middle" font-family="Helvetica,Arial,sans-serif" font-size="12" fill="black">JSON</text>


  <!-- Arrow: Back-End <-> Front-End, upper line -->
  <line x1="425" y1="157" x2="490" y2="157"
        stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>
  <!-- Arrow: Front-End → Back-End, lower line -->
  <line x1="490" y1="167" x2="425" y2="167"
        stroke="black" stroke-width="1.4" marker-end="url(#arrow)"/>

</svg>